<mat-toolbar color="primary">
  <span>Generic Fantasy Platform</span>
  <span class="spacer"></span>
  @if (currentUser(); as user) {
    <span class="username">Welcome, {{ user.username }}</span>
  }
  <button mat-button (click)="logout()">Logout</button>
</mat-toolbar>

<app-popular-domains />

<div class="content">
  <p>You are logged in.</p>
  <div class="nav-links">
    <a mat-flat-button routerLink="/domains">Manage Domains</a>
    <a mat-flat-button routerLink="/leagues">Manage Leagues</a>
  </div>
</div>
